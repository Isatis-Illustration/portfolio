<div class="w-full flex items-center justify-center">

  <!-- Card container -->
  <div class="group relative w-full overflow-hidden rounded-[var(--radius-card)]
              bg-white cursor-pointer
              shadow-[var(--shadow-card)]
              transition-all duration-300 ease-[cubic-bezier(0.34,1.56,0.64,1)]
              hover:-translate-y-1 hover:shadow-[var(--shadow-card-hover)]"
       [ngClass]="{
         'opacity-0': !hasLoaded && content.imageUrl,
         'opacity-100': hasLoaded || !content.imageUrl
       }"
       (click)="onClickImageEvent.emit(content)">

    <!-- Image -->
    <div class="relative w-full overflow-hidden bg-white">
      <img *ngIf="content.imageUrl"
           (load)="hasLoaded = true"
           [src]="content.imageUrl"
           [alt]="content.title"
           class="w-full h-auto object-contain select-none
                  transition-transform duration-500 ease-out
                  group-hover:scale-[1.03]" />
    </div>

    <!-- Title overlay on hover -->
    <div class="absolute inset-x-0 bottom-0
                bg-gradient-to-t from-black/50 via-black/20 to-transparent
                px-4 py-4
                translate-y-full group-hover:translate-y-0
                transition-transform duration-300 ease-out">
      <h3 class="font-fredoka text-white text-lg font-medium drop-shadow-md">
        {{ content.title || 'Senza titolo' }}
      </h3>
    </div>
  </div>

  <!-- Loader -->
  <ng-container *ngIf="!hasLoaded && content.imageUrl">
    <div class="relative flex items-center justify-center w-full h-54">
      <div class="loader z-10"></div>
    </div>
  </ng-container>

</div>
