<section class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-20">

  <div *ngIf="user()" class="flex flex-col-reverse md:flex-row gap-12 md:gap-16 items-start">

    <!-- Bio content -->
    <div class="flex-1">
      <h1 class="font-fredoka text-3xl md:text-4xl font-semibold text-title mb-2">
        {{ user().firstName }} {{ user().lastName }}
      </h1>
      <p class="font-fredoka text-lg text-verde-scuro mb-8">Isatis — Illustratrice</p>

      <div class="prose prose-lg font-quicksand text-title/80 leading-relaxed
                  [&_b]:font-fredoka [&_b]:text-title [&_b]:text-xl [&_b]:block [&_b]:mt-8 [&_b]:mb-3
                  [&_ul]:mt-4 [&_ul]:space-y-2 [&_li]:text-base"
           [innerHTML]="description()">
      </div>
    </div>

    <!-- Photo -->
    <div class="w-full md:w-1/3 md:sticky md:top-28 flex justify-center">
      <div class="relative">
        <img [src]="user().imageUrl"
             (load)="imgLoaded = true"
             alt="Isabella Laurenzi"
             class="w-48 md:w-full max-w-xs rounded-2xl shadow-[var(--shadow-card)]
                    transition-all duration-500 ease-out
                    hover:shadow-[var(--shadow-glow)]"
             [ngClass]="{ 'opacity-0': !imgLoaded, 'opacity-100': imgLoaded }">
        <!-- Decorative dot -->
        <div class="absolute -bottom-3 -right-3 w-16 h-16 rounded-full bg-arancione/20 -z-10"></div>
        <div class="absolute -top-3 -left-3 w-10 h-10 rounded-full bg-logo/40 -z-10"></div>
      </div>
    </div>

  </div>

</section>
