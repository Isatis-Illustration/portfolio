<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">

  <!-- Gallery title con immagine -->
  <div class="flex items-center gap-4 mb-8 md:mb-12">
    <!-- <img [src]="titleImage()"
         [alt]="getTitle()"
         class="h-10 md:h-14 w-auto object-contain select-none"> -->
    <h1 class="font-fredoka text-3xl md:text-4xl font-semibold text-title">
      {{ getTitle() }}
    </h1>
  </div>

  <!-- Masonry grid with row-to-column order -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div *ngFor="let col of columns(); let colIdx = index" class="flex flex-col gap-6">
      <div *ngFor="let c of col; trackBy: trackById; let i = index"
           class="animate-fade-in-up"
           [style.animation-delay]="((colIdx + i * columnsCount()) * 60) + 'ms'"
           [style.opacity]="0">
        <app-card
          [content]="c"
          [isCharacter]="isCharactersGallery()"
          (onClickImageEvent)="openImageViewer($event)">
        </app-card>
      </div>
    </div>
  </div>

</section>
