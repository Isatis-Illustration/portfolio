<!-- ═══════════════════════════════════════════
     HERO SECTION
     ═══════════════════════════════════════════ -->
<section class="relative w-full min-h-[60vh] flex flex-col items-center justify-center
                px-6 py-16 md:py-24 overflow-hidden
                bg-gradient-to-b">

  <!-- Hero content -->
  <div class="relative z-10 flex flex-col items-center gap-6 max-w-4xl mx-auto">

    <!-- Nome: GIF mode -->
    <div *ngIf="useGifName" class="flex flex-col md:flex-row items-center justify-center gap-x-8 gap-y-2
                animate-hero-entrance">
      <div class="w-3/5 sm:w-1/2 xl:w-2/5">
        <img [src]="nameGif" alt="Isabella" class="select-none w-full"/>
      </div>
      <div class="w-3/5 sm:w-1/2 xl:w-2/5">
        <img [src]="lNameGif" alt="Laurenzi" class="select-none w-full"/>
      </div>
    </div>

    <!-- Nome: Testo Fredoka mode -->
    <div *ngIf="!useGifName" class="text-center animate-hero-entrance">
      <h1 class="font-fredoka text-5xl md:text-7xl xl:text-8xl font-bold text-title tracking-tight">
        Isabella Laurenzi
      </h1>
    </div>

    <!-- Sottotitolo -->
    <div class="w-48 sm:w-56 md:w-64 animate-hero-entrance" style="animation-delay: 200ms; opacity: 0;">
      <img [src]="subTitle()" alt="Illustratrice" class="w-full select-none">
    </div>

    <!-- CTA buttons -->
    <div class="flex flex-wrap items-center justify-center gap-4 mt-6
                animate-hero-entrance" style="animation-delay: 400ms; opacity: 0;">
      <button (click)="navigate('gallery/illustrations')"
              class="px-8 py-3 rounded-full bg-white text-title font-fredoka font-medium text-lg
                     border-2 border-crema-scuro
                     shadow-[0_4px_16px_rgba(0,0,0,0.04)]
                     hover:border-arancione hover:shadow-[0_6px_24px_rgba(242,176,163,0.2)] hover:-translate-y-0.5
                     active:scale-95 transition-all duration-300 cursor-pointer">
        {{ 'ILLUSTRATIONS' | translate }}
      </button>
      <button (click)="navigate('gallery/character-design')"
              class="px-8 py-3 rounded-full bg-white text-title font-fredoka font-medium text-lg
                     border-2 border-crema-scuro
                     shadow-[0_4px_16px_rgba(0,0,0,0.04)]
                     hover:border-arancione hover:shadow-[0_6px_24px_rgba(242,176,163,0.2)] hover:-translate-y-0.5
                     active:scale-95 transition-all duration-300 cursor-pointer">
        {{ 'CHARACTER' | translate }}
      </button>
    </div>
  </div>
</section>


<!-- ═══════════════════════════════════════════
     PREVIEW GALLERY
     ═══════════════════════════════════════════ -->
<section *ngIf="previewIllustrations().length > 0"
         class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16 md:pb-24">

  <div class="text-center mb-12">
    <h2 class="font-fredoka text-3xl md:text-4xl font-semibold text-title">
      {{ 'HOME_PREVIEW_TITLE' | translate }}
    </h2>
    <p class="mt-3 text-title/60 font-quicksand text-lg">
      {{ 'HOME_PREVIEW_SUBTITLE' | translate }}
    </p>
  </div>

  <!-- Grid preview in masonry layout with row-to-column order -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    <div *ngFor="let col of columns(); let colIdx = index" class="flex flex-col gap-6">
      <div *ngFor="let content of col; trackBy: trackById; let i = index"
           class="animate-fade-in-up"
           [style.animation-delay]="((colIdx + i * columnsCount()) * 80) + 'ms'"
           [style.opacity]="0">
        <app-card [content]="content"
                  [isCharacter]="false"
                  (onClickImageEvent)="openDetail($event)">
        </app-card>
      </div>
    </div>
  </div>

  <!-- CTA "Vedi tutte" -->
  <div class="text-center mt-12">
    <button (click)="navigate('gallery/illustrations')"
            class="group inline-flex items-center gap-2 px-6 py-3 text-verde-scuro font-fredoka font-medium text-lg
                   hover:text-verde-scuro/80 transition-colors duration-200 cursor-pointer">
      {{ 'HOME_SEE_ALL' | translate }}
      <svg class="w-5 h-5 transition-transform duration-200 group-hover:translate-x-1"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
      </svg>
    </button>
  </div>
</section>


<!-- ═══════════════════════════════════════════
     MINI BIO + CTA
     ═══════════════════════════════════════════ -->
<section class="bg-[#fff2c8] py-16 md:py-20">
  <div class="max-w-4xl mx-auto px-6 flex flex-col md:flex-row items-center gap-8 md:gap-12">

    <div class="flex-1 text-center md:text-left">
      <h2 class="font-fredoka text-2xl md:text-3xl font-semibold text-title mb-4">
        {{ 'HOME_BIO_TITLE' | translate }}
      </h2>
      <p class="font-quicksand text-title/70 text-lg leading-relaxed">
        {{ 'HOME_BIO_SHORT' | translate }}
      </p>
      <div class="mt-6 flex flex-wrap gap-4 justify-center md:justify-start">
        <button (click)="navigate('profile')"
                class="px-6 py-2.5 rounded-full bg-arancione/20 text-title font-fredoka font-medium
                       hover:bg-arancione/30 transition-colors duration-200 cursor-pointer">
          {{ 'PROFILE' | translate }}
        </button>
        <button (click)="navigate('contacts')"
                class="px-6 py-2.5 rounded-full border-2 border-arancione/30 text-title font-fredoka font-medium
                       hover:bg-arancione/10 transition-colors duration-200 cursor-pointer">
          {{ 'CONTACTS' | translate }}
        </button>
      </div>
    </div>
  </div>
</section>
