<div class="flex flex-col w-full">
  <div class="flex flex-col gap-8">

    <form [formGroup]="userForm" class="flex flex-col gap-6">

      <input
        formControlName="name"
        [placeholder]="'FORM_NAME' | translate"
        class="w-full px-0 py-3 bg-transparent border-b-2 border-crema-scuro
               font-quicksand text-title placeholder:text-title/40
               focus:outline-none focus:border-verde-scuro
               transition-colors duration-200" />

      <input
        formControlName="email"
        [placeholder]="'FORM_EMAIL' | translate"
        class="w-full px-0 py-3 bg-transparent border-b-2
               font-quicksand text-title placeholder:text-title/40
               focus:outline-none transition-colors duration-200"
        [ngClass]="{
          'border-crema-scuro focus:border-verde-scuro': isRequiredValid('email'),
          'border-red-400 focus:border-red-500': !isRequiredValid('email')
        }" />

      <input
        formControlName="subject"
        [placeholder]="'FORM_SUBJECT' | translate"
        class="w-full px-0 py-3 bg-transparent border-b-2 border-crema-scuro
               font-quicksand text-title placeholder:text-title/40
               focus:outline-none focus:border-verde-scuro
               transition-colors duration-200" />

      <textarea
        formControlName="message"
        [placeholder]="'FORM_MESSAGE' | translate"
        [rows]="5"
        class="w-full px-4 py-3 bg-white rounded-xl border-2
               font-quicksand text-title placeholder:text-title/40
               resize-none focus:outline-none transition-colors duration-200"
        [ngClass]="{
          'border-crema-scuro focus:border-verde-scuro': isRequiredValid('message'),
          'border-red-400 focus:border-red-500': !isRequiredValid('message')
        }">
      </textarea>

      <div class="flex items-center justify-between gap-4">
        <button
          (click)="onSubmit()"
          [disabled]="isButtonDisabled()"
          class="px-8 py-3 rounded-full bg-verde-scuro text-white font-fredoka font-medium text-lg
                 shadow-[0_4px_16px_rgba(129,199,132,0.3)]
                 hover:shadow-[0_6px_24px_rgba(129,199,132,0.4)] hover:-translate-y-0.5
                 active:scale-95 transition-all duration-300 cursor-pointer
                 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-none">
          {{ getSendText() | translate }}
        </button>

        <p *ngIf="formFeedback" class="font-quicksand font-semibold text-title/70">
          {{ formFeedback | translate }}
        </p>

        <button class="p-2 rounded-full bg-verde-pastello/30 text-title/60
                       hover:bg-verde-pastello/50 transition-colors duration-200 cursor-pointer"
                (click)="goToPolicy()"
                [innerHTML]="getIcon('policy')">
        </button>
      </div>
    </form>

  </div>
</div>
