<div #image
  class="h-full w-full bg-black/90 backdrop-blur-sm flex justify-center items-center
         overflow-hidden relative select-none opacity-0"
  (wheel)="onWheel($event)"
  (dblclick)="resetZoom()"
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
>
  <button
    class="fixed right-0 top-0 m-4 z-20 p-2.5 rounded-full
           bg-white/20 backdrop-blur-sm text-white
           hover:bg-white/30 transition-colors duration-200 cursor-pointer"
    (click)="closeViewer()"
    aria-label="Chiudi">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>

  <img
    #zoomImage
    class="max-w-full max-h-full object-contain z-10 touch-none select-none grabbable"
    [src]="content?.imageUrl"
    alt="Content image"
    draggable="false"
    [style.transform]="'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + zoom + ')'"
    [style.transition]="isPanning ? 'none' : zoomTransition"
    (load)="animateViewer()"
    (mousedown)="startPan($event)"
    (mousemove)="onPan($event)"
    (mouseup)="endPan()"
    (mouseleave)="endPan()"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)"
    (touchend)="endPan()"
    />
</div>
